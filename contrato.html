<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2D324B">
<meta name="robots" content="noindex">
<title>Contrato Assinado · SAFEBOAT</title>
<link rel="icon" type="image/png" href="img/logo-circulo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #F0F1F5; color: #1A1F2B; line-height: 1.55; }
  .cert-wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 0; }
  .cert { background: #fff; border: 2px solid #0B6B4D; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(26,31,43,.1); }
  .cert-h { background: #2D324B; color: #fff; padding: 20px 24px; display: flex; align-items: center; gap: 14px; }
  .cert-h img { height: 40px; }
  .cert-h .t { font-size: 15px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .cert-h .s { font-size: 12px; opacity: .75; margin-top: 2px; }
  .cert-b { padding: 20px 24px; }
  .cert-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px 20px; }
  .cf b { display: block; font-size: 10.5px; letter-spacing: 1.2px; text-transform: uppercase; color: #8A8F9C; font-weight: 800; margin-bottom: 2px; }
  .cf span { font-size: 14px; color: #1A1F2B; font-weight: 600; word-break: break-word; }
  .cert-hash { margin-top: 14px; border-top: 1px dashed #E3E5EB; padding-top: 12px; }
  .cert-hash b { font-size: 10.5px; letter-spacing: 1.2px; text-transform: uppercase; color: #8A8F9C; font-weight: 800; }
  .cert-hash code { display: block; font-family: ui-monospace, Consolas, monospace; font-size: 11px; color: #4E5666; background: #F4F5F8; border-radius: 8px; padding: 8px 10px; margin-top: 4px; word-break: break-all; }
  .cert-legal { margin-top: 12px; font-size: 11.5px; color: #6B7080; line-height: 1.5; }
  .aviso { max-width: 860px; margin: 12px auto 0; padding: 0 16px; }
  .aviso div { background: #FFF7E0; border: 1px solid #EAD9A0; border-radius: 10px; padding: 10px 14px; font-size: 12.5px; color: #6B5A16; }
  .doc { max-width: 860px; margin: 20px auto 40px; padding: 0 16px; }
  .doc-inner { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(26,31,43,.1); overflow: hidden; }
  /* elementos interativos do snapshot do contrato não fazem sentido aqui */
  .doc-root button, .doc-root .print { display: none !important; }
  .err { max-width: 560px; margin: 80px auto; background: #fff; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 2px 12px rgba(26,31,43,.1); }
  .err img { height: 60px; margin-bottom: 16px; }
  .err b { display: block; font-size: 17px; color: #2D324B; margin-bottom: 8px; }
  .err span { font-size: 13.5px; color: #4E5666; }
  .loading { text-align: center; padding: 120px 20px; color: #8A8F9C; font-size: 14px; }
  .print { position: fixed; bottom: 18px; right: 18px; background: #2D324B; color: #fff; border: none; border-radius: 24px; padding: 12px 20px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 20px rgba(26,31,43,.35); font-family: inherit; z-index: 10; }
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { background: #fff; }
    .print { display: none; }
    .cert { break-inside: avoid; page-break-inside: avoid; box-shadow: none; }
    .doc-inner { box-shadow: none; }
  }
</style>
</head>
<body>
<div id="app"><div class="loading">Carregando contrato…</div></div>
<script>
'use strict';
/* ============================================================
   SAFEBOAT · Contrato assinado eletronicamente
   Exibe o certificado de assinatura (aceite clickwrap) e o
   snapshot do contrato preservado no banco no momento do aceite.
   Acesso somente com nº da proposta + código do link.
   ============================================================ */
const SUPA_URL = 'https://ppdafbzlnjgggycecjhs.supabase.co';
const SUPA_KEY = 'sb_publishable_IN2C9q60_SfQjDgVwGCzrQ_vPCdoADp';

const esc = (s) => String(s || '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

async function rpc(fn, args) {
  const r = await fetch(SUPA_URL + '/rest/v1/rpc/' + fn, {
    method: 'POST',
    headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(args),
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function parseRef() {
  const q = new URLSearchParams(location.search).get('p') || '';
  const m = q.match(/^(\d+)-([a-z0-9]{4,10})$/i);
  return m ? { n: parseInt(m[1], 10), t: m[2] } : null;
}

function erroHTML(msg) {
  return '<div class="err"><img src="img/logo-circulo.png" alt="SAFEBOAT"><b>' + msg + '</b>' +
    '<span>Confira se o link foi copiado por completo ou fale com o consultor SAFEBOAT.</span></div>';
}

function fmtDataHora(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo', dateStyle: 'short', timeStyle: 'medium' }) + ' (horário de Brasília)';
  } catch (e) { return iso; }
}

async function main() {
  const app = document.getElementById('app');
  const ref = parseRef();
  if (!ref) { app.innerHTML = erroHTML('Link de contrato inválido'); return; }

  let c = null;
  let modoAtual = false; // true = exibindo termos vigentes (sem snapshot no banco)
  try {
    const rows = await rpc('contrato_get', { n: ref.n, t: ref.t });
    if (rows && rows.length) c = rows[0];
  } catch (e) { /* função ainda não criada no banco — tenta o fallback */ }

  if (!c) {
    try {
      const rows = await rpc('prop_get', { n: ref.n, t: ref.t });
      if (rows && rows.length && rows[0].status === 'aceita') { c = rows[0]; modoAtual = true; }
    } catch (e) { /* segue para o erro */ }
  }
  if (!c) { app.innerHTML = erroHTML('Contrato não encontrado ou ainda não assinado'); return; }

  document.title = 'Contrato Assinado — ' + (c.aceite_nome || c.cliente) + ' · SAFEBOAT';
  const numeroFmt = String(c.numero).padStart(4, '0');
  const docLabel = c.segmento === 'B2B' ? 'CNPJ' : 'CPF';
  const plano = c.plano === 'anual' ? 'Anual (R$ 2.490,00/ano)' : c.plano === 'mensal' ? 'Mensal (R$ 249,00/mês)' : '—';

  let contratoHTML = c.contrato_html || null;
  if (!contratoHTML) {
    // sem snapshot no banco: exibe a versão vigente dos termos, com aviso
    modoAtual = true;
    try {
      contratoHTML = await (await fetch(c.segmento === 'B2B' ? 'termos-b2b.html' : 'termos-b2c.html', { cache: 'no-store' })).text();
    } catch (e) { contratoHTML = null; }
  }

  // extrai <style> e <body> do documento do contrato para incorporar na página
  let docStyles = '', docBody = '';
  if (contratoHTML) {
    try {
      const dom = new DOMParser().parseFromString(contratoHTML, 'text/html');
      docStyles = Array.from(dom.querySelectorAll('style'))
        .map((s) => s.textContent)
        .join('\n')
        // escopa o CSS do contrato para não afetar o certificado
        .replace(/(^|\})\s*([^@{}][^{}]*)\{/g, (m, close, sel) => close + ' ' + sel.split(',').map((x) => '.doc-inner ' + x.trim().replace(/^body$/i, '.doc-root').replace(/^html$/i, '.doc-root')).join(', ') + '{');
      docBody = dom.body ? dom.body.innerHTML : '';
    } catch (e) { docBody = ''; }
  }

  app.innerHTML =
    '<div class="cert-wrap"><div class="cert">' +
      '<div class="cert-h"><img src="img/logo-circulo.png" alt="SAFEBOAT"><div><div class="t">Contrato assinado eletronicamente</div><div class="s">Proposta SAFEBOAT Nº ' + numeroFmt + ' · aceite registrado com evidências</div></div></div>' +
      '<div class="cert-b">' +
        '<div class="cert-grid">' +
          '<div class="cf"><b>Assinado por</b><span>' + esc(c.aceite_nome || c.cliente) + '</span></div>' +
          '<div class="cf"><b>' + docLabel + '</b><span>' + esc(c.aceite_doc || '—') + '</span></div>' +
          '<div class="cf"><b>Cliente da proposta</b><span>' + esc(c.cliente) + '</span></div>' +
          '<div class="cf"><b>Data e hora do aceite</b><span>' + fmtDataHora(c.aceite_at) + '</span></div>' +
          '<div class="cf"><b>Plano contratado</b><span>' + plano + '</span></div>' +
          '<div class="cf"><b>Implementação</b><span>' + (Number(c.valor) ? Number(c.valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : 'Isenta') + '</span></div>' +
          (c.aceite_ip ? '<div class="cf"><b>Endereço IP</b><span>' + esc(c.aceite_ip) + '</span></div>' : '') +
          (c.aceite_ua ? '<div class="cf"><b>Dispositivo (user agent)</b><span style="font-size:11.5px;font-weight:500">' + esc(c.aceite_ua) + '</span></div>' : '') +
        '</div>' +
        (c.aceite_hash ? '<div class="cert-hash"><b>Impressão digital do contrato aceito · SHA-256</b><code>' + esc(c.aceite_hash) + '</code></div>' : '') +
        '<div class="cert-legal">Aceite eletrônico registrado na plataforma SAFEBOAT mediante confirmação expressa dos Termos de Uso e do Contrato de Prestação de Serviços, com identificação do signatário (nome e ' + docLabel + '), carimbo de data/hora' + (c.aceite_ip ? ', endereço IP' : '') + (c.aceite_hash ? ' e hash criptográfico do documento' : '') + '. Forma de contratação admitida pelo art. 10, § 2º, da MP 2.200-2/2001 e pelo Marco Civil da Internet (Lei 12.965/2014).</div>' +
      '</div>' +
    '</div></div>' +
    (modoAtual ? '<div class="aviso"><div>⚠ Exibindo a <b>versão vigente</b> dos termos — o snapshot deste aceite não está disponível no banco de dados.</div></div>' : '') +
    '<div class="doc"><div class="doc-inner"><div class="doc-root">' + (docBody || '<div style="padding:30px;text-align:center;color:#8A8F9C">Não foi possível carregar o texto do contrato.</div>') + '</div></div></div>' +
    '<button class="print" onclick="window.print()">🖨 Salvar PDF</button>';

  if (docStyles) {
    const st = document.createElement('style');
    st.textContent = docStyles;
    document.head.appendChild(st);
  }
}

main();
</script>
</body>
</html>
