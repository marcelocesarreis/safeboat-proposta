<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Câmera de segurança Wi-Fi Full HD">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#3A4062"/>
      <stop offset="100%" stop-color="#2D324B"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#F1F3F7"/>
      <stop offset="100%" stop-color="#D5DAE3"/>
    </linearGradient>
    <linearGradient id="arm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDEFF3"/>
      <stop offset="100%" stop-color="#C7CCD6"/>
    </linearGradient>
    <radialGradient id="lens" cx="38%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#2A2E38"/>
      <stop offset="45%" stop-color="#14161C"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="ant" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0D5DE"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="400" height="400" rx="10" fill="url(#bg)"/>
  <ellipse cx="212" cy="322" rx="132" ry="22" fill="#000000" opacity="0.22"/>

  <!-- Mount -->
  <rect x="44" y="168" width="26" height="66" rx="10" fill="url(#arm)"/>
  <rect x="66" y="190" width="66" height="24" rx="12" fill="url(#arm)"/>
  <circle cx="132" cy="202" r="17" fill="#E7EAF0"/>

  <!-- Antennas -->
  <g filter="url(#sh)">
    <rect x="150" y="60" width="12" height="92" rx="6" transform="rotate(-16 156 106)" fill="url(#ant)"/>
    <circle cx="129" cy="66" r="8" fill="url(#ant)"/>
    <rect x="236" y="60" width="12" height="92" rx="6" transform="rotate(15 242 106)" fill="url(#ant)"/>
    <circle cx="266" cy="66" r="8" fill="url(#ant)"/>
  </g>

  <!-- Body -->
  <g filter="url(#sh)">
    <rect x="120" y="140" width="176" height="124" rx="40" fill="url(#body)" stroke="#C3C9D4" stroke-width="1.5"/>
    <!-- Lens face -->
    <circle cx="256" cy="202" r="58" fill="#0C0D11"/>
    <circle cx="256" cy="202" r="50" fill="url(#lens)"/>
    <circle cx="256" cy="202" r="30" fill="none" stroke="#2C2F38" stroke-width="3"/>
    <circle cx="256" cy="202" r="14" fill="#05060A"/>
    <ellipse cx="240" cy="184" rx="16" ry="11" fill="#ffffff" opacity="0.22"/>
  </g>

  <!-- Brand tick -->
  <rect x="150" y="230" width="46" height="7" rx="3.5" fill="#B9BFCB"/>
</svg>
